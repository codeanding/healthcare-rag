server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	# Health endpoint for ECS/ALB health checks. Cheap, doesn't touch disk.
	location = /health {
		access_log off;
		add_header Content-Type text/plain;
		return 200 'ok';
	}

	# Cache built assets aggressively — Vite hashes filenames so this is safe.
	location /assets/ {
		expires 1y;
		access_log off;
		add_header Cache-Control "public, immutable";
	}

	# SPA fallback — every non-asset path serves index.html so React Router
	# (or whatever client routing you add later) handles it.
	location / {
		try_files $uri $uri/ /index.html;
	}

	# Don't return a body for 404s on assets — let the browser fall back.
	error_page 404 /index.html;

	# Standard hardening
	server_tokens off;
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "DENY" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
